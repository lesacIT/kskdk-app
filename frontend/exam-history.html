<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch sử khám - TKG TAEKWANG</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#f5f7f5;padding:20px}
  .header{background:#1D9E75;color:white;padding:15px 20px;border-radius:12px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
  .header h1{font-size:20px;display:flex;align-items:center;gap:10px}
  .back-btn{background:rgba(255,255,255,0.2);border:none;color:white;padding:8px 16px;border-radius:30px;cursor:pointer;text-decoration:none}
  .search-card{background:white;border-radius:12px;padding:20px;margin-bottom:20px}
  .search-bar{display:flex;gap:12px;flex-wrap:wrap}
  .search-bar input{flex:2;padding:12px;border:1.5px solid #e0e0e0;border-radius:8px}
  .search-bar button{padding:12px 24px;background:#1D9E75;color:white;border:none;border-radius:8px;cursor:pointer}
  .container{background:white;border-radius:12px;padding:20px;overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th,td{border:1px solid #ddd;padding:8px;text-align:left}
  th{background:#f0f0f0}
  .loading{text-align:center;padding:40px}
</style>
</head>
<body>
<div class="header">
  <h1><i class="fas fa-history"></i> Lịch sử khám</h1>
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Quay lại</a>
</div>

<div class="search-card">
  <div class="search-bar">
    <input type="text" id="searchEmpId" placeholder="Nhập mã nhân viên">
    <button onclick="searchHistory()"><i class="fas fa-search"></i> Tìm kiếm</button>
  </div>
</div>

<div class="container" id="historyContainer">
  <div class="loading">Nhập mã nhân viên để xem lịch sử</div>
</div>

<script type="module">
  import api from './js/api.js';

  async function searchHistory() {
    const empId = document.getElementById('searchEmpId').value.trim();
    if (!empId) {
      alert('Vui lòng nhập mã nhân viên');
      return;
    }
    const container = document.getElementById('historyContainer');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i> Đang tải...</div>';
    try {
      // Lấy phiếu khám mới nhất (hiện tại API chỉ có 1 phiếu mới nhất, không có lịch sử nhiều phiếu)
      // Để đơn giản, ta chỉ hiển thị phiếu hiện tại. Có thể mở rộng thêm bảng lưu nhiều phiếu.
      const examRes = await api.getLatestExamination(empId);
      const exam = examRes.data;
      if (!exam) {
        container.innerHTML = '<p>Không tìm thấy phiếu khám cho nhân viên này.</p>';
        return;
      }
      let html = '<h3>Phiếu khám gần nhất</h3>';
      html += '<table><thead><tr><th>Ngày khám</th><th>Dữ liệu</th></tr></thead><tbody>';
      const date = new Date(exam.exam_date).toLocaleString('vi-VN');
      html += `<tr><td>${date}</td><td><pre>${JSON.stringify(exam.data, null, 2)}</pre></td></tr>`;
      html += '</tbody></table>';
      container.innerHTML = html;
    } catch (err) {
      container.innerHTML = `<p style="color:red">Lỗi: ${err.message}</p>`;
    }
  }
  window.searchHistory = searchHistory;
</script>
</body>
</html>
