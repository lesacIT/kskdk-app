<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý nhân viên - TKG TAEKWANG CẦN THƠ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--primary:#1D9E75;--primary-dark:#0F6E56;--bg:#F9FAFB;--card:#fff;--border:#E5E7EB;--radius:12px}
  body{font-family:'Segoe UI',sans-serif;background:var(--bg)}
  
  .header-manager{background:linear-gradient(135deg,#1D9E75 0%,#0F6E56 100%);color:white;padding:30px 20px;margin-bottom:30px}
  .header-content{max-width:1400px;margin:0 auto}
  .back-link{display:inline-flex;align-items:center;gap:8px;color:white;text-decoration:none;background:rgba(255,255,255,0.2);padding:8px 20px;border-radius:30px;margin-bottom:20px}
  .back-link:hover{background:rgba(255,255,255,0.3)}
  .header-manager h1{font-size:28px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
  
  .main{max-width:1400px;margin:0 auto;padding:0 20px 40px}
  
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px}
  .stat-card{background:var(--card);border-radius:var(--radius);padding:20px;text-align:center;border:1px solid var(--border)}
  .stat-number{font-size:36px;font-weight:700;color:var(--primary)}
  .stat-label{font-size:13px;color:#6B7280;margin-top:8px}
  
  .card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
  .card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#F9FAFB;flex-wrap:wrap;gap:10px}
  .card-header h2{font-size:18px;color:var(--primary-dark);display:flex;align-items:center;gap:8px}
  .card-body{padding:20px}
  
  .search-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .search-bar input{flex:2;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:14px}
  .search-bar select{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;background:white}
  
  .table-container{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th,td{padding:12px;text-align:left;border-bottom:1px solid var(--border)}
  th{background:linear-gradient(135deg,#1D9E75,#0F6E56);color:white;font-weight:600}
  tr:hover{background:#F9FAFB}
  
  .action-buttons{display:flex;gap:6px;flex-wrap:wrap}
  .btn-primary,.btn-success,.btn-warning,.btn-danger{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:4px}
  .btn-primary{background:linear-gradient(135deg,#1D9E75,#0F6E56);color:white}
  .btn-success{background:#10B981;color:white}
  .btn-warning{background:#F59E0B;color:white}
  .btn-danger{background:#EF4444;color:white}
  .btn-secondary{background:white;color:var(--primary-dark);border:1.5px solid var(--primary);padding:8px 16px;border-radius:8px;cursor:pointer}
  
  .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
  .modal.active{display:flex}
  .modal-content{background:white;border-radius:var(--radius);max-width:550px;width:90%;max-height:90vh;overflow-y:auto}
  .modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .modal-body{padding:20px}
  .modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end}
  
  .form-row{display:grid;gap:16px;margin-bottom:16px}
  .form-row.cols-2{grid-template-columns:1fr 1fr}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-group label{font-size:13px;font-weight:500;color:#6B7280}
  .form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px}
  .form-group input:focus,.form-group select:focus{border-color:var(--primary);outline:none}
  
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1F2937;color:white;padding:12px 24px;border-radius:50px;opacity:0;transition:opacity .3s;z-index:1000}
  .toast.show{opacity:1}
  
  @media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.form-row.cols-2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header-manager">
  <div class="header-content">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Quay lại trang khám</a>
    <h1><i class="fas fa-users"></i> QUẢN LÝ DANH SÁCH NHÂN VIÊN</h1>
    <p>Thêm, sửa, xóa, import/export danh sách nhân viên</p>
  </div>
</div>

<div class="main">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-number" id="totalEmployees">0</div><div class="stat-label">Tổng nhân viên</div></div>
    <div class="stat-card"><div class="stat-number" id="maleCount">0</div><div class="stat-label">Nam</div></div>
    <div class="stat-card"><div class="stat-number" id="femaleCount">0</div><div class="stat-label">Nữ</div></div>
    <div class="stat-card"><div class="stat-number" id="deptCount">0</div><div class="stat-label">Phòng ban</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2><i class="fas fa-list"></i> Danh sách nhân viên</h2>
      <div>
        <button class="btn-success" onclick="downloadSampleExcel()" style="margin-right:8px"><i class="fas fa-download"></i> Tải mẫu Excel</button>
        <label class="btn-success" style="cursor:pointer;padding:8px 16px;border-radius:8px;display:inline-flex;align-items:center;gap:6px">
          <i class="fas fa-file-import"></i> Import Excel
          <input type="file" id="importExcel" accept=".xlsx,.xls,.csv" style="display:none" onchange="importExcel(this)">
        </label>
        <button class="btn-primary" onclick="exportToExcel()" style="margin-left:8px"><i class="fas fa-file-excel"></i> Xuất Excel</button>
        <button class="btn-success" onclick="showAddEmployeeModal()" style="margin-left:8px"><i class="fas fa-plus"></i> Thêm NV</button>
      </div>
    </div>
    <div class="card-body">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Tìm theo mã, tên, phòng ban..." onkeyup="renderEmployeeTable()">
        <select id="deptFilter" onchange="renderEmployeeTable()">
          <option value="">📁 Tất cả phòng ban</option>
        </select>
      </div>
      <div class="table-container">
        <table id="employeeTable">
          <thead>
            <tr><th>STT</th><th>Mã NV</th><th>Họ tên</th><th>Giới tính</th><th>Ngày sinh</th><th>Phòng ban</th><th>Chức vụ</th><th>Điện thoại</th><th>Thao tác</th> </tr>
          </thead>
          <tbody id="employeeTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="employeeModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3 id="modalTitle"><i class="fas fa-user-plus"></i> Thêm nhân viên</h3><button class="btn-secondary" onclick="closeModal()">✖</button></div>
    <div class="modal-body">
      <div class="form-row"><div class="form-group"><label>Mã NV *</label><input type="text" id="empIdInput"></div><div class="form-group"><label>Họ tên *</label><input type="text" id="empNameInput"></div></div>
      <div class="form-row cols-2"><div class="form-group"><label>Giới tính</label><select id="empGenderInput"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select></div><div class="form-group"><label>Ngày sinh</label><input type="date" id="empDobInput"></div></div>
      <div class="form-row"><div class="form-group"><label>Phòng ban</label><input type="text" id="empDeptInput"></div><div class="form-group"><label>Chức vụ</label><input type="text" id="empPositionInput"></div></div>
      <div class="form-row cols-2"><div class="form-group"><label>SĐT</label><input type="text" id="empPhoneInput"></div><div class="form-group"><label>Email</label><input type="email" id="empEmailInput"></div></div>
      <div class="form-group"><label>Ghi chú</label><textarea id="empNoteInput" rows="2"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn-secondary" onclick="closeModal()">Hủy</button><button class="btn-primary" onclick="saveEmployee()">Lưu</button></div>
  </div>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMessage"></span></div>

<script>
let employees = [];
let currentEditId = null;

// ==================== DỮ LIỆU KHỞI TẠO ====================
function loadEmployees() {
  const stored = localStorage.getItem('employees');
  if(stored) {
    employees = JSON.parse(stored);
  } else {
    // Dữ liệu mẫu ban đầu (mã bắt đầu 20000000)
    employees = [
      { id:"20000001", name:"NGUYỄN VĂN HÙNG", gender:"Nam", dob:"1995-03-10", dept:"Chuyền May 1", position:"Thợ may", phone:"0902000001", email:"nguyenvanhung@tkg.com", note:"" },
      { id:"20000002", name:"TRẦN THỊ LAN", gender:"Nữ", dob:"1992-07-15", dept:"Chuyền May 1", position:"Thợ may", phone:"0902000002", email:"tranthilan@tkg.com", note:"" },
      { id:"20000003", name:"LÊ VĂN THÀNH", gender:"Nam", dob:"1988-11-22", dept:"Chuyền May 2", position:"Chuyền trưởng", phone:"0902000003", email:"levanthanh@tkg.com", note:"" },
      { id:"20000004", name:"PHẠM THỊ HOA", gender:"Nữ", dob:"1993-05-05", dept:"Chuyền May 2", position:"Thợ may", phone:"0902000004", email:"phamthihoa@tkg.com", note:"" },
      { id:"20000005", name:"HOÀNG VĂN TÂM", gender:"Nam", dob:"1990-09-18", dept:"Chuyền Cắt", position:"Thợ cắt", phone:"0902000005", email:"hoangvantam@tkg.com", note:"" },
      { id:"20000006", name:"NGÔ THỊ MAI", gender:"Nữ", dob:"1991-12-30", dept:"Chuyền Cắt", position:"Thợ cắt", phone:"0902000006", email:"ngothimai@tkg.com", note:"" },
      { id:"20000007", name:"ĐẶNG VĂN PHÚC", gender:"Nam", dob:"1987-04-12", dept:"Chuyền Là", position:"Chuyền trưởng", phone:"0902000007", email:"dangvanphuc@tkg.com", note:"" },
      { id:"20000008", name:"BÙI THỊ THU", gender:"Nữ", dob:"1994-08-25", dept:"Chuyền Là", position:"Thợ là", phone:"0902000008", email:"buithithu@tkg.com", note:"" },
      { id:"20000009", name:"VŨ VĂN LONG", gender:"Nam", dob:"1989-10-09", dept:"Chuyền KCS", position:"Kiểm tra viên", phone:"0902000009", email:"vuvanlong@tkg.com", note:"" },
      { id:"20000010", name:"LÝ THỊ HẰNG", gender:"Nữ", dob:"1996-02-28", dept:"Chuyền KCS", position:"Kiểm tra viên", phone:"0902000010", email:"lythihang@tkg.com", note:"" }
    ];
    localStorage.setItem('employees', JSON.stringify(employees));
  }
  updateDeptFilter();
  updateStats();
  renderEmployeeTable();
}

function updateDeptFilter() {
  const depts = [...new Set(employees.map(e => e.dept).filter(d => d))];
  const select = document.getElementById('deptFilter');
  const currentValue = select.value;
  select.innerHTML = '<option value="">📁 Tất cả phòng ban</option>';
  depts.forEach(dept => {
    select.innerHTML += `<option value="${dept}">🏢 ${dept}</option>`;
  });
  select.value = currentValue;
}

function updateStats() {
  document.getElementById('totalEmployees').textContent = employees.length;
  document.getElementById('maleCount').textContent = employees.filter(e=>e.gender==='Nam').length;
  document.getElementById('femaleCount').textContent = employees.filter(e=>e.gender==='Nữ').length;
  const uniqueDepts = [...new Set(employees.map(e=>e.dept).filter(d=>d))];
  document.getElementById('deptCount').textContent = uniqueDepts.length;
}

function renderEmployeeTable() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  const deptFilter = document.getElementById('deptFilter').value;
  let filtered = employees.filter(emp => {
    const matchSearch = emp.id.includes(searchTerm) || emp.name.toLowerCase().includes(searchTerm) || (emp.dept && emp.dept.toLowerCase().includes(searchTerm));
    const matchDept = !deptFilter || emp.dept === deptFilter;
    return matchSearch && matchDept;
  });
  const tbody = document.getElementById('employeeTableBody');
  tbody.innerHTML = '';
  filtered.forEach((emp, idx) => {
    const row = tbody.insertRow();
    row.insertCell(0).textContent = idx+1;
    row.insertCell(1).textContent = emp.id;
    row.insertCell(2).innerHTML = `<strong>${emp.name}</strong>`;
    row.insertCell(3).innerHTML = emp.gender === 'Nam' ? '👨 Nam' : '👩 Nữ';
    row.insertCell(4).textContent = emp.dob || '—';
    row.insertCell(5).textContent = emp.dept || '—';
    row.insertCell(6).textContent = emp.position || '—';
    row.insertCell(7).textContent = emp.phone || '—';
    const actionCell = row.insertCell(8);
    actionCell.className = 'action-buttons';
    actionCell.innerHTML = `
      <button class="btn-primary" onclick="goToExam('${emp.id}')"><i class="fas fa-stethoscope"></i> Khám</button>
      <button class="btn-warning" onclick="editEmployee('${emp.id}')"><i class="fas fa-edit"></i> Sửa</button>
      <button class="btn-danger" onclick="deleteEmployee('${emp.id}')"><i class="fas fa-trash"></i> Xóa</button>
    `;
  });
}

function goToExam(id) {
  const emp = employees.find(e=>e.id===id);
  if(emp) {
    localStorage.setItem('selectedEmployee', JSON.stringify({id:emp.id, name:emp.name, dept:emp.dept, dob:emp.dob, gender:emp.gender}));
    window.location.href = 'index.html';
  }
}

// ==================== THÊM / SỬA / XÓA ====================
function showAddEmployeeModal() {
  currentEditId = null;
  document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus"></i> Thêm nhân viên';
  document.getElementById('empIdInput').value = '';
  document.getElementById('empIdInput').readOnly = false;
  document.getElementById('empNameInput').value = '';
  document.getElementById('empGenderInput').value = 'Nam';
  document.getElementById('empDobInput').value = '';
  document.getElementById('empDeptInput').value = '';
  document.getElementById('empPositionInput').value = '';
  document.getElementById('empPhoneInput').value = '';
  document.getElementById('empEmailInput').value = '';
  document.getElementById('empNoteInput').value = '';
  document.getElementById('employeeModal').classList.add('active');
}

function editEmployee(id) {
  const emp = employees.find(e=>e.id===id);
  if(!emp) return;
  currentEditId = id;
  document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit"></i> Sửa nhân viên';
  document.getElementById('empIdInput').value = emp.id;
  document.getElementById('empIdInput').readOnly = true;
  document.getElementById('empNameInput').value = emp.name;
  document.getElementById('empGenderInput').value = emp.gender;
  document.getElementById('empDobInput').value = emp.dob || '';
  document.getElementById('empDeptInput').value = emp.dept || '';
  document.getElementById('empPositionInput').value = emp.position || '';
  document.getElementById('empPhoneInput').value = emp.phone || '';
  document.getElementById('empEmailInput').value = emp.email || '';
  document.getElementById('empNoteInput').value = emp.note || '';
  document.getElementById('employeeModal').classList.add('active');
}

function saveEmployee() {
  const empData = {
    id: document.getElementById('empIdInput').value.trim(),
    name: document.getElementById('empNameInput').value.trim().toUpperCase(),
    gender: document.getElementById('empGenderInput').value,
    dob: document.getElementById('empDobInput').value,
    dept: document.getElementById('empDeptInput').value.trim(),
    position: document.getElementById('empPositionInput').value.trim(),
    phone: document.getElementById('empPhoneInput').value.trim(),
    email: document.getElementById('empEmailInput').value.trim(),
    note: document.getElementById('empNoteInput').value.trim()
  };
  if(!empData.id || !empData.name) { showToast('Vui lòng nhập mã và tên', 'error'); return; }
  if(currentEditId) {
    const idx = employees.findIndex(e=>e.id===currentEditId);
    if(idx!==-1) employees[idx] = {...employees[idx], ...empData};
    showToast('Cập nhật thành công!', 'success');
  } else {
    if(employees.find(e=>e.id===empData.id)) { showToast('Mã NV đã tồn tại!', 'error'); return; }
    employees.push(empData);
    showToast('Thêm thành công!', 'success');
  }
  localStorage.setItem('employees', JSON.stringify(employees));
  updateDeptFilter();
  updateStats();
  closeModal();
  renderEmployeeTable();
}

function deleteEmployee(id) {
  if(confirm('Xóa nhân viên này?')) {
    employees = employees.filter(e=>e.id!==id);
    localStorage.setItem('employees', JSON.stringify(employees));
    updateDeptFilter();
    updateStats();
    renderEmployeeTable();
    showToast('Đã xóa!', 'success');
  }
}

function closeModal() { document.getElementById('employeeModal').classList.remove('active'); }

// ==================== IMPORT / EXPORT EXCEL ====================
function downloadSampleExcel() {
  const sampleData = [
    { 'Mã NV': '20000100', 'Họ tên': 'NGUYỄN VĂN MẪU', 'Giới tính': 'Nam', 'Ngày sinh': '1990-01-01', 'Phòng ban': 'Chuyền May 1', 'Chức vụ': 'Thợ may', 'SĐT': '0900000000', 'Email': 'mau@tkg.com' },
    { 'Mã NV': '20000101', 'Họ tên': 'TRẦN THỊ MẪU', 'Giới tính': 'Nữ', 'Ngày sinh': '1995-02-02', 'Phòng ban': 'Chuyền May 2', 'Chức vụ': 'Thợ may', 'SĐT': '0900000001', 'Email': 'thimau@tkg.com' }
  ];
  const ws = XLSX.utils.json_to_sheet(sampleData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'MauNhanVien');
  XLSX.writeFile(wb, 'mau_nhan_vien_TKG.xlsx');
  showToast('Đã tải file mẫu Excel!', 'success');
}

function importExcel(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet, { defval: "" });
      console.log('Dữ liệu import:', json);
      if(json.length === 0) {
        showToast('File không có dữ liệu!', 'error');
        return;
      }
      let imported = 0;
      let skipped = 0;
      // Tìm cột chứa mã và tên (linh hoạt)
      const firstRow = json[0];
      const idKeys = ['Mã NV', 'Mã nhân viên', 'id', 'ID', 'ma_nv', 'ma'];
      const nameKeys = ['Họ tên', 'Họ và tên', 'name', 'Name', 'ten'];
      let idKey = null, nameKey = null;
      for(let key in firstRow) {
        if(idKeys.some(k => key.toLowerCase().includes(k.toLowerCase()))) idKey = key;
        if(nameKeys.some(k => key.toLowerCase().includes(k.toLowerCase()))) nameKey = key;
      }
      if(!idKey) idKey = Object.keys(firstRow)[0]; // cột đầu tiên làm mã
      if(!nameKey) nameKey = Object.keys(firstRow)[1]; // cột thứ hai làm tên
      console.log('Dùng cột mã:', idKey, 'cột tên:', nameKey);
      json.forEach(row => {
        const id = row[idKey];
        const name = row[nameKey];
        if(id && name && !employees.find(e=>e.id===id.toString())) {
          employees.push({
            id: id.toString(),
            name: name.toString().toUpperCase(),
            gender: row['Giới tính'] || row['gender'] || row['gioi_tinh'] || 'Nam',
            dob: row['Ngày sinh'] || row['dob'] || row['ngay_sinh'] || '',
            dept: row['Phòng ban'] || row['dept'] || row['phong_ban'] || '',
            position: row['Chức vụ'] || row['position'] || row['chuc_vu'] || '',
            phone: row['SĐT'] || row['Điện thoại'] || row['phone'] || row['sdt'] || '',
            email: row['Email'] || row['email'] || '',
            note: row['Ghi chú'] || row['note'] || ''
          });
          imported++;
        } else {
          skipped++;
        }
      });
      if(imported > 0) {
        localStorage.setItem('employees', JSON.stringify(employees));
        updateDeptFilter();
        updateStats();
        renderEmployeeTable();
        showToast(`✅ Import thành công ${imported} nhân viên! (Bỏ qua ${skipped} dòng không hợp lệ)`, 'success');
      } else {
        showToast(`⚠️ Không có dữ liệu hợp lệ để import. Kiểm tra file có cột "Mã NV" và "Họ tên" không.`, 'error');
      }
    } catch (error) {
      console.error('Import lỗi:', error);
      showToast('Lỗi khi đọc file: ' + error.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

function exportToExcel() {
  const data = employees.map(e => ({
    'Mã NV': e.id,
    'Họ tên': e.name,
    'Giới tính': e.gender,
    'Ngày sinh': e.dob,
    'Phòng ban': e.dept,
    'Chức vụ': e.position,
    'SĐT': e.phone,
    'Email': e.email,
    'Ghi chú': e.note
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'DanhSachNhanVien');
  XLSX.writeFile(wb, `nhan_vien_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('Xuất Excel thành công!', 'success');
}

// ==================== TIỆN ÍCH ====================
function showToast(msg, type='info') {
  const toast = document.getElementById('toast');
  const toastMsg = document.getElementById('toastMessage');
  const icon = toast.querySelector('i');
  toastMsg.textContent = msg;
  if(type==='success') { icon.className = 'fas fa-check-circle'; toast.style.background = '#10B981'; }
  else if(type==='error') { icon.className = 'fas fa-exclamation-triangle'; toast.style.background = '#EF4444'; }
  else { icon.className = 'fas fa-info-circle'; toast.style.background = '#1F2937'; }
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 3000);
}

document.addEventListener('DOMContentLoaded', () => {
  loadEmployees();
});
</script>
</body>
