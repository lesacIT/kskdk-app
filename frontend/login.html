<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - Hệ thống khám sức khỏe TKG</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#1D9E75 0%,#0F6E56 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .login-container{
    background:white;
    border-radius:20px;
    padding:40px;
    width:400px;
    max-width:90%;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
  }
  .login-header{
    text-align:center;
    margin-bottom:30px;
  }
  .login-header .icon{
    font-size:60px;
    color:#1D9E75;
  }
  .login-header h1{
    font-size:24px;
    color:#1D9E75;
    margin-top:10px;
  }
  .form-group{
    margin-bottom:20px;
  }
  .form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
    color:#666;
  }
  .form-group input, .form-group select{
    width:100%;
    padding:12px 16px;
    border:1.5px solid #e0e0e0;
    border-radius:10px;
    font-size:15px;
  }
  .form-group input:focus, .form-group select:focus{
    outline:none;
    border-color:#1D9E75;
  }
  .btn-login{
    width:100%;
    padding:14px;
    background:#1D9E75;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-login:hover{
    background:#0F6E56;
  }
  .back-link{
    text-align:center;
    margin-top:20px;
  }
  .back-link a{
    color:#1D9E75;
    text-decoration:none;
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <div class="icon"><i class="fas fa-stethoscope"></i></div>
    <h1>ĐĂNG NHẬP HỆ THỐNG</h1>
    <p style="color:#999;margin-top:5px">Khám sức khỏe định kỳ</p>
  </div>
  
  <div class="form-group">
    <label><i class="fas fa-user-md"></i> Chọn chuyên khoa</label>
    <select id="doctorSpecialty">
      <option value="">-- Chọn chuyên khoa --</option>
      <option value="nk">🏥 Nội khoa - BS. Nguyễn Văn A</option>
      <option value="ng">🩺 Ngoại khoa - BS. Trần Văn B</option>
      <option value="mt">👁 Mắt - BS. Lê Thị C</option>
      <option value="tmh">👂 Tai Mũi Họng - BS. Phạm Văn D</option>
      <option value="rhm">🦷 Răng Hàm Mặt - BS. Hoàng Văn E</option>
      <option value="sp">👶 Sản phụ khoa - BS. Nguyễn Thị F</option>
    </select>
  </div>
  
  <div class="form-group">
    <label><i class="fas fa-lock"></i> Mật khẩu</label>
    <input type="password" id="password" placeholder="Nhập mật khẩu" value="123456">
  </div>
  
  <button class="btn-login" onclick="login()"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
  
  <div class="back-link">
    <a href="index.html"><i class="fas fa-arrow-left"></i> Quay lại trang chủ</a>
  </div>
</div>

<script>
const doctors = {
  nk: { name: "BS. Nguyễn Văn A", specialty: "Nội khoa", password: "123456", icon: "🫀" },
  ng: { name: "BS. Trần Văn B", specialty: "Ngoại khoa", password: "123456", icon: "🩺" },
  mt: { name: "BS. Lê Thị C", specialty: "Mắt", password: "123456", icon: "👁" },
  tmh: { name: "BS. Phạm Văn D", specialty: "Tai Mũi Họng", password: "123456", icon: "👂" },
  rhm: { name: "BS. Hoàng Văn E", specialty: "Răng Hàm Mặt", password: "123456", icon: "🦷" },
  sp: { name: "BS. Nguyễn Thị F", specialty: "Sản phụ khoa", password: "123456", icon: "👶" }
};

function login() {
  const specialty = document.getElementById('doctorSpecialty').value;
  const password = document.getElementById('password').value;
  
  if(!specialty) {
    alert('Vui lòng chọn chuyên khoa');
    return;
  }
  
  const doctor = doctors[specialty];
  if(!doctor || doctor.password !== password) {
    alert('Sai mật khẩu! Mật khẩu mặc định: 123456');
    return;
  }
  
  sessionStorage.setItem('currentDoctor', JSON.stringify({
    id: specialty,
    name: doctor.name,
    specialty: doctor.specialty,
    icon: doctor.icon
  }));
  
  window.location.href = 'doctor-dashboard.html';
}
</script>
</body>
</html>
