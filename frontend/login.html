<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - Hệ thống khám sức khỏe TKG</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#1D9E75 0%,#0F6E56 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .login-container{
    background:white;
    border-radius:20px;
    padding:40px;
    width:400px;
    max-width:90%;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
  }
  .login-header{text-align:center;margin-bottom:30px}
  .login-header .icon{font-size:60px;color:#1D9E75}
  .login-header h1{font-size:24px;color:#1D9E75;margin-top:10px}
  .form-group{margin-bottom:20px}
  .form-group label{display:block;margin-bottom:8px;font-weight:500;color:#666}
  .form-group input{width:100%;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px}
  .btn-login{width:100%;padding:14px;background:#1D9E75;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
  .back-link{text-align:center;margin-top:20px}
  .back-link a{color:#1D9E75;text-decoration:none}
  .checkbox{display:flex;align-items:center;gap:8px;margin-bottom:20px}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <div class="icon"><i class="fas fa-stethoscope"></i></div>
    <h1>ĐĂNG NHẬP HỆ THỐNG</h1>
    <p style="color:#999">Sử dụng tài khoản được cấp</p>
  </div>

  <div class="form-group">
    <label><i class="fas fa-user"></i> Tên đăng nhập</label>
    <input type="text" id="username" placeholder="Ví dụ: nk, ng, mt, nurse, conclusion">
  </div>
  <div class="form-group">
    <label><i class="fas fa-lock"></i> Mật khẩu</label>
    <input type="password" id="password" placeholder="Mật khẩu (mặc định: 123456)">
  </div>
  <div class="checkbox">
    <input type="checkbox" id="rememberMe">
    <label>Ghi nhớ đăng nhập (7 ngày)</label>
  </div>

  <button class="btn-login" onclick="login()"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>
  <div class="register-link" style="text-align: center; margin-top: 15px;">
  Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
</div>
  <div class="back-link">
    <a href="index.html"><i class="fas fa-arrow-left"></i> Quay lại trang chủ</a>
  </div>
  <div id="errorMsg" style="color:red;text-align:center;margin-top:10px;display:none"></div>
</div>

<script type="module">
  import api from './js/api.js';

  window.login = async function() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('rememberMe').checked;
    if (!username || !password) {
      alert('Vui lòng nhập tên đăng nhập và mật khẩu');
      return;
    }
    try {
      const result = await api.login(username, password, rememberMe);
      // Lấy thông tin chi tiết người dùng (bao gồm specialty)
      const me = await api.getCurrentUser();
      sessionStorage.setItem('currentUser', JSON.stringify(me.user));
      window.location.href = 'doctor-dashboard.html';
    } catch (err) {
      document.getElementById('errorMsg').textContent = err.message;
      document.getElementById('errorMsg').style.display = 'block';
    }
  };
</script>
</body>
</html>
