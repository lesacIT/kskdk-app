<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - Hệ thống khám sức khỏe TKG</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#1D9E75 0%,#0F6E56 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .login-container{
    background:white;
    border-radius:20px;
    padding:40px;
    width:400px;
    max-width:90%;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
  }
  .login-header{text-align:center;margin-bottom:30px}
  .login-header .icon{font-size:60px;color:#1D9E75}
  .login-header h1{font-size:24px;color:#1D9E75;margin-top:10px}
  .form-group{margin-bottom:20px}
  .form-group label{display:block;margin-bottom:8px;font-weight:500;color:#666}
  .form-group input,.form-group select{width:100%;padding:12px 16px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px}
  .form-group input:focus,.form-group select:focus{outline:none;border-color:#1D9E75}
  .btn-login{width:100%;padding:14px;background:#1D9E75;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
  .btn-login:hover{background:#0F6E56}
  .back-link{text-align:center;margin-top:20px}
  .back-link a{color:#1D9E75;text-decoration:none}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-header">
    <div class="icon"><i class="fas fa-stethoscope"></i></div>
    <h1>ĐĂNG NHẬP HỆ THỐNG</h1>
    <p style="color:#999;margin-top:5px">Chọn vai trò để đăng nhập</p>
  </div>

  <div class="form-group">
    <label><i class="fas fa-user-md"></i> Vai trò</label>
    <select id="userRole">
      <option value="">-- Chọn vai trò --</option>
      <option value="nurse">👩‍⚕️ Điều dưỡng (Khám tổng quát)</option>
      <option value="nk">🫀 Bác sĩ Nội khoa</option>
      <option value="ng">🩺 Bác sĩ Ngoại khoa</option>
      <option value="mt">👁 Bác sĩ Mắt</option>
      <option value="tmh">👂 Bác sĩ Tai Mũi Họng</option>
      <option value="rhm">🦷 Bác sĩ Răng Hàm Mặt</option>
      <option value="sp">👶 Bác sĩ Sản phụ khoa</option>
      <option value="conclusion">📝 Bác sĩ Kết luận</option>
    </select>
  </div>

  <div class="form-group">
    <label><i class="fas fa-lock"></i> Mật khẩu</label>
    <input type="password" id="password" placeholder="Nhập mật khẩu" value="123456">
  </div>

  <button class="btn-login" onclick="login()"><i class="fas fa-sign-in-alt"></i> Đăng nhập</button>

  <div class="back-link">
    <a href="index.html"><i class="fas fa-arrow-left"></i> Quay lại trang chủ</a>
  </div>
</div>

<script>
// Danh sách tài khoản
const accounts = {
  nurse:    { name: "Điều dưỡng", role: "nurse", icon: "👩‍⚕️", password: "123456" },
  nk:       { name: "BS. Nguyễn Văn A", role: "specialist", specialty: "Nội khoa", specialtyId: "nk", icon: "🫀", password: "123456" },
  ng:       { name: "BS. Trần Văn B", role: "specialist", specialty: "Ngoại khoa", specialtyId: "ng", icon: "🩺", password: "123456" },
  mt:       { name: "BS. Lê Thị C", role: "specialist", specialty: "Mắt", specialtyId: "mt", icon: "👁", password: "123456" },
  tmh:      { name: "BS. Phạm Văn D", role: "specialist", specialty: "Tai Mũi Họng", specialtyId: "tmh", icon: "👂", password: "123456" },
  rhm:      { name: "BS. Hoàng Văn E", role: "specialist", specialty: "Răng Hàm Mặt", specialtyId: "rhm", icon: "🦷", password: "123456" },
  sp:       { name: "BS. Nguyễn Thị F", role: "specialist", specialty: "Sản phụ khoa", specialtyId: "sp", icon: "👶", password: "123456" },
  conclusion:{ name: "BS. Kết luận", role: "conclusion", icon: "📝", password: "123456" }
};

function login() {
  const role = document.getElementById('userRole').value;
  const password = document.getElementById('password').value;
  if(!role) {
    alert('Vui lòng chọn vai trò');
    return;
  }
  const user = accounts[role];
  if(!user || user.password !== password) {
    alert('Sai mật khẩu! Mật khẩu mặc định: 123456');
    return;
  }
  sessionStorage.setItem('currentUser', JSON.stringify(user));
  window.location.href = 'doctor-dashboard.html';
}
</script>
</body>
</html>
