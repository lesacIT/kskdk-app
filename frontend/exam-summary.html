<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tổng hợp kết quả khám - TKG TAEKWANG</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#f5f7f5;padding:20px}
  .header{background:#1D9E75;color:white;padding:15px 20px;border-radius:12px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
  .header h1{font-size:20px;display:flex;align-items:center;gap:10px}
  .back-btn{background:rgba(255,255,255,0.2);border:none;color:white;padding:8px 16px;border-radius:30px;cursor:pointer;text-decoration:none}
  .container{background:white;border-radius:12px;padding:20px;overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th,td{border:1px solid #ddd;padding:8px;text-align:left}
  th{background:#f0f0f0}
  .loading{text-align:center;padding:40px}
  @media(max-width:768px){body{padding:10px}.header{flex-direction:column;gap:10px}}
</style>
</head>
<body>
<div class="header">
  <h1><i class="fas fa-chart-line"></i> Tổng hợp kết quả khám</h1>
  <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Quay lại</a>
</div>
<div class="container" id="summaryContainer">
  <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Đang tải dữ liệu...</div>
</div>

<script type="module">
  import api from './js/api.js';

  async function loadSummary() {
    try {
      // Lấy danh sách tất cả bệnh nhân và phiếu khám mới nhất
      const employeesRes = await api.getEmployees();
      const employees = employeesRes.data;
      let summaryHtml = '<h3>Danh sách phiếu khám</h3><table><thead><tr><th>STT</th><th>Mã NV</th><th>Họ tên</th><th>Ngày khám</th><th>Kết luận</th><th>Phân loại SK</th><th>Bác sĩ KL</th></tr></thead><tbody>';
      let index = 1;
      for (let emp of employees) {
        try {
          const examRes = await api.getLatestExamination(emp.patient_code);
          const exam = examRes.data;
          if (exam && exam.data) {
            const kl = exam.data.kl || {};
            const examDate = exam.exam_date ? new Date(exam.exam_date).toLocaleDateString('vi-VN') : '—';
            let healthClass = '';
            if (kl.healthClass) healthClass = `${kl.healthClass} - ${kl.healthClass === 1 ? 'Rất tốt' : kl.healthClass === 2 ? 'Tốt' : kl.healthClass === 3 ? 'Trung bình' : kl.healthClass === 4 ? 'Kém' : 'Rất kém'}`;
            summaryHtml += `<tr>
              <td>${index++}</td>
              <td>${emp.patient_code}</td>
              <td>${emp.name}</td>
              <td>${examDate}</td>
              <td>${kl.fit || '—'}</td>
              <td>${healthClass}</td>
              <td>${kl.doctor || '—'}</td>
            </tr>`;
          }
        } catch(e) { /* không có phiếu */ }
      }
      summaryHtml += '</tbody></table>';
      if (index === 1) summaryHtml = '<p>Chưa có dữ liệu phiếu khám nào.</p>';
      document.getElementById('summaryContainer').innerHTML = summaryHtml;
    } catch (err) {
      document.getElementById('summaryContainer').innerHTML = `<p style="color:red">Lỗi tải dữ liệu: ${err.message}</p>`;
    }
  }

  loadSummary();
</script>
</body>
</html>
