<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bác sĩ kết luận</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--primary:#1D9E75;--primary-dark:#0F6E56;--primary-light:#E1F5EE;--bg:#f5f7f5;--card:#fff;--border:#e0e0e0;--radius:12px}
  body{font-family:'Segoe UI',sans-serif;background:var(--bg);min-height:100vh}
  .header{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);color:white;padding:20px}
  .header-content{max-width:800px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
  .logout-btn{background:rgba(255,255,255,0.2);padding:8px 16px;border-radius:30px;border:none;color:white;cursor:pointer}
  .main{max-width:800px;margin:0 auto;padding:20px}
  .search-card{background:white;border-radius:var(--radius);padding:20px;margin-bottom:20px;border:1px solid var(--border)}
  .search-bar{display:flex;gap:12px;flex-wrap:wrap}
  .search-bar input{flex:2;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px}
  .search-bar button{padding:12px 24px;background:var(--primary);color:white;border:none;border-radius:10px;cursor:pointer}
  .patient-list{background:white;border-radius:var(--radius);border:1px solid var(--border);overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}
  th{background:#f8f9fa;color:var(--primary-dark)}
  .exam-btn{background:var(--primary);color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer}
  .badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px}
  .badge-done{background:var(--primary-light);color:var(--primary-dark)}
  .badge-pending{background:#f0f0f0;color:#999}
  @media(max-width:640px){.search-bar{flex-direction:column}}
  .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
  .modal.active{display:flex}
  .modal-content{background:white;border-radius:var(--radius);max-width:500px;width:90%;max-height:90vh;overflow-y:auto}
  .modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
  .modal-body{padding:20px}
  .modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end}
  .health-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:15px 0}
  .health-option{border:2px solid var(--border);border-radius:8px;padding:10px;text-align:center;cursor:pointer}
  .health-option.selected{border-color:var(--primary);background:var(--primary-light)}
  .radio-label{padding:8px 16px;border:1.5px solid var(--border);border-radius:30px;cursor:pointer}
  .radio-label.selected{background:var(--primary-light);border-color:var(--primary)}
</style>
</head>
<body>
<div class="header">
  <div class="header-content">
    <div>Bác sĩ kết luận</div>
    <button class="logout-btn" onclick="logout()">Đăng xuất</button>
  </div>
</div>
<div class="main">
  <div class="search-card">
    <div class="search-bar">
      <input type="text" id="searchById" placeholder="🔢 Nhập mã nhân viên cần tìm...">
      <button onclick="searchPatient()">Tìm kiếm</button>
      <button onclick="resetSearch()" style="background:#6B7280">Reset</button>
    </div>
  </div>
  <div class="patient-list">
    <table id="patientTable">
      <thead><tr><th>Mã NV</th><th>Họ tên</th><th>Phòng ban</th><th>Trạng thái</th><th>Thao tác</th></tr></thead>
      <tbody id="patientTableBody"></tbody>
    </table>
  </div>
</div>
<div id="conclusionModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3>Kết luận sức khỏe</h3><button onclick="closeModal()">✖</button></div>
    <div class="modal-body">
      <div id="modalPatientInfo" style="background:#f5f5f5;padding:10px;border-radius:8px;margin-bottom:15px"></div>
      <div class="form-group"><label>Phân loại sức khỏe tổng thể</label><div class="health-grid" id="healthClassGrid"></div></div>
      <div class="form-group"><label>Kết luận</label><div class="radio-group" id="fitGroup"></div></div>
      <div class="form-group"><label>Ghi chú / Hướng giải quyết</label><textarea id="conclusionResolution" rows="3" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px"></textarea></div>
    </div>
    <div class="modal-footer"><button onclick="closeModal()">Hủy</button><button class="btn-primary" onclick="saveConclusion()">Lưu kết luận</button></div>
  </div>
</div>
<script>
let patients = [];
let currentPatient = null;

function loadPatients() {
  const employees = JSON.parse(localStorage.getItem('employees') || '[]');
  const completedExams = JSON.parse(localStorage.getItem('completedExams') || '[]');
  // Chỉ lấy những bệnh nhân đã khám đủ các khoa bắt buộc
  patients = employees.filter(emp => {
    const exam = completedExams.find(e => e.patient?.empId === emp.id);
    if(!exam) return false;
    const sections = exam.completedSections || [];
    const required = ['tq','nk','ng','mt','tmh','rhm'];
    if(emp.gender === 'Nữ') required.push('sp');
    const hasAll = required.every(s => sections.includes(s));
    const hasConclusion = sections.includes('kl');
    return hasAll && !hasConclusion; // chỉ hiện những người chưa có kết luận
  }).map(emp => ({ ...emp }));
  renderTable(patients);
}

function renderTable(data) {
  const tbody = document.getElementById('patientTableBody');
  tbody.innerHTML = '';
  data.forEach(p => {
    const row = tbody.insertRow();
    row.insertCell(0).innerHTML = `<strong>${p.id}</strong>`;
    row.insertCell(1).innerHTML = `<strong>${p.name}</strong>`;
    row.insertCell(2).textContent = p.dept || '—';
    row.insertCell(3).innerHTML = '<span class="badge badge-pending">Chưa kết luận</span>';
    row.insertCell(4).innerHTML = `<button class="exam-btn" onclick="openConclusion('${p.id}')">Kết luận</button>`;
  });
}

function searchPatient() {
  const id = document.getElementById('searchById').value.trim();
  if(!id) {
    renderTable(patients);
    return;
  }
  const filtered = patients.filter(p => p.id === id);
  renderTable(filtered);
  if(filtered.length === 0) alert('Không tìm thấy nhân viên hoặc nhân viên chưa đủ điều kiện kết luận');
}

function resetSearch() {
  document.getElementById('searchById').value = '';
  renderTable(patients);
}

function openConclusion(empId) {
  currentPatient = patients.find(p => p.id === empId);
  if(!currentPatient) return;
  document.getElementById('modalPatientInfo').innerHTML = `<strong>${currentPatient.name}</strong> (${currentPatient.id}) - ${currentPatient.dept || ''}`;
  // Tạo các ô phân loại
  let healthHtml = '';
  for(let i=1;i<=5;i++) {
    let label = i===1?'Rất tốt':i===2?'Tốt':i===3?'Trung bình':i===4?'Kém':'Rất kém';
    healthHtml += `<div class="health-option" data-class="${i}" onclick="selectHealth(this)"><div>${i}</div><div>${label}</div></div>`;
  }
  document.getElementById('healthClassGrid').innerHTML = healthHtml;
  // Tạo radio cho kết luận
  document.getElementById('fitGroup').innerHTML = `
    <label class="radio-label" onclick="selectFit(this)">Đủ sức khỏe</label>
    <label class="radio-label" onclick="selectFit(this)">Không đủ sức khỏe</label>
    <label class="radio-label" onclick="selectFit(this)">Tạm thời không đủ</label>
  `;
  document.getElementById('conclusionResolution').value = '';
  document.getElementById('conclusionModal').classList.add('active');
}

function selectHealth(el) {
  document.querySelectorAll('.health-option').forEach(opt=>opt.classList.remove('selected'));
  el.classList.add('selected');
}
function selectFit(el) {
  document.querySelectorAll('#fitGroup .radio-label').forEach(l=>l.classList.remove('selected'));
  el.classList.add('selected');
}
function closeModal() { document.getElementById('conclusionModal').classList.remove('active'); }
function saveConclusion() {
  const healthSelected = document.querySelector('.health-option.selected');
  const fitSelected = document.querySelector('#fitGroup .radio-label.selected');
  if(!healthSelected) { alert('Chọn phân loại sức khỏe'); return; }
  if(!fitSelected) { alert('Chọn kết luận'); return; }
  const healthClass = parseInt(healthSelected.getAttribute('data-class'));
  const fit = fitSelected.innerText;
  const resolution = document.getElementById('conclusionResolution').value;
  const conclusionData = {
    healthClass, fit, resolution,
    doctor: "BS. Kết luận",
    signDate: new Date().toISOString().slice(0,10),
    clinic: "Trung tâm y tế TKG"
  };
  let completedExams = JSON.parse(localStorage.getItem('completedExams') || '[]');
  let exam = completedExams.find(e => e.patient?.empId === currentPatient.id);
  if(exam) {
    if(!exam.examData) exam.examData = {};
    exam.examData.kl = conclusionData;
    if(!exam.completedSections.includes('kl')) exam.completedSections.push('kl');
  } else {
    completedExams.push({
      patient: currentPatient,
      examData: { kl: conclusionData },
      completedSections: ['kl'],
      completeDate: new Date().toISOString()
    });
  }
  localStorage.setItem('completedExams', JSON.stringify(completedExams));
  closeModal();
  loadPatients();
  alert('Đã lưu kết luận!');
}

function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }
loadPatients();
</script>
</body>
</html>
